<section class="ato-phase" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; padding:20px;">
    <div>
        <label>THEATER (NATION)</label><br>
        <select id="nation-select" onchange="updateAircraftMenu()">
            <option value="">-- SELECT --</option>
            <option value="USA">USA</option>
            <option value="Great Britain">UK</option>
            <option value="USSR">USSR</option>
            <option value="Germany">GERMANY</option>
        </select>
    </div>
    <div>
        <label>AIRCRAFT (ATO)</label><br>
        <select id="aircraft-select">
            <option>-- SELECT NATION --</option>
        </select>
    </div>
</section>

<header class="tactical-header" style="display:flex; justify-content:space-between; padding:10px;">
    <div>MASTER ARM: <input type="checkbox" id="master-arm" onclick="toggleMasterArm()"></div>
    <div id="systemStatus">SYSTEM COLD</div>
</header>

<button id="run-sim" style="width:100%; padding:20px; background:#004400; color:#00FF41; border:1px solid #00FF41;" disabled onclick="runSimulation()">RUN TRIPLE SIM</button>
