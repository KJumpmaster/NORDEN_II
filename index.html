<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NORDEN II Pass 8.1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cockpit">

<!-- LEFT -->
<div class="panel left-panel">
<h2>LOADOUT</h2>

<label>COUNTRY</label>
<select id="country"></select>

<label>AIRCRAFT</label>
<select id="ac"></select>

<label>ALTITUDE</label>
<input value="8000">

<label>SPEED</label>
<input value="400">

<label>DIVE</label>
<input value="0">

<label>STAND OFF DISTANCE</label>
<input value="3">

<div class="adv">AIRFRAME LIMITS NOMINAL</div>

</div>

<!-- CENTER -->
<div class="panel center-panel">

<div class="state">
<div>LASER: NO</div>
<div>CCRP: YES</div>
<div>SMART: NO</div>
</div>

<img src="b52.png" class="b52">

<div class="solutions">
<div class="card">A<br>MK82<br>SALVO 1</div>
<div class="card">B<br>MK82<br>SALVO 1</div>
<div class="card">C<br>MK82<br>SALVO 1</div>
</div>

<img src="flag_usa.png" class="flag">

</div>

<!-- RIGHT -->
<div class="panel right-panel">
<h2>COMMAND</h2>
<button>SOLVE</button>
<div>READY</div>
</div>

</div>

</body>
</html>
