<div class="mfd-screen">
        <h1>--- NORDEN II HUD ---</h1>
        
        <div class="input-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div><label>ALTITUDE (FT)</label><input type="number" id="alt-input" value="8000"></div>
            <div><label>SPEED (MPH)</label><input type="number" id="speed-input" value="400"></div>
            
            <div><label>DRAG COEFF (Cx)</label><input type="number" id="drag-input" step="0.001" value="0.012"></div>
            <div><label>MASS (KG)</label><input type="number" id="mass-input" value="227"></div>
            
            <div><label>CALIBER (M)</label><input type="number" id="caliber-input" step="0.01" value="0.27"></div>
            <div><label>TNT EQ (KG)</label><input type="number" id="tnt-input" value="118"></div>

            <div>
                <label>SALVO QTY</label>
                <select id="salvo-select">
                    <option value="1">SINGLE (1)</option>
                    <option value="2">PAIR (2)</option>
                    <option value="4">FLIGHT (4)</option>
                    <option value="8">CARPET (8)</option>
                </select>
            </div>
            <button id="run-sim" onclick="runPhysics()">CALCULATE RELEASE</button>
        </div>
        
        <div id="mission-readout" style="margin-top: 20px; border-top: 1px solid #444; padding-top: 10px; font-size: 0.8em;">
            TARGETING DATA: STANDBY...
        </div>
    </div>
