<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NORDEN II</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cockpit">

<section class="panel left-panel">
<h2>LOADOUT</h2>

<label>COUNTRY</label>
<select></select>

<label>AIRCRAFT</label>
<select></select>

<div class="flight-grid">
<div><div class="mini-label">ALTITUDE</div><input value="8000"></div>
<div><div class="mini-label">SPEED</div><input value="400"></div>
<div><div class="mini-label">DIVE</div><input value="0"></div>
</div>

<div class="standoff-block">
<div>STAND OFF</div>
<div>DISTANCE</div>
<input value="3">
<div class="unit-label">METRES</div>
</div>

<div class="adv">AIRFRAME LIMITS NOMINAL</div>
</section>

<section class="panel center-panel">

<div class="solutions">
<div class="solution-card">A</div>
<div class="solution-card">B</div>
<div class="solution-card">C</div>
</div>

<img src="b52.png" class="b52">
<img src="flag_britain.png" class="flag">

</section>

<section class="panel right-panel">
<h2>COMMAND</h2>

<select><option>FOCUS A</option></select>
<button>SOLVE</button>
<button>ARM LOAD</button>

<div class="command-box">READY</div>

<div class="radar-box">
<video class="radar-video" autoplay loop muted>
<source src="Deep_Screen_D_Radar_Design.mp4">
</video>
</div>

</section>

</div>

</body>
</html>
