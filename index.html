<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NORDEN II | STRATEGIC HUB</title>
    <style>
        body { background-color: #050505; color: #00FF41; font-family: 'Courier New', monospace; text-shadow: 0 0 5px #00FF41; background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%; }
        .mfd-screen { border: 4px double #00FF41; margin: 20px; padding: 20px; background: rgba(0, 20, 0, 0.2); box-shadow: inset 0 0 20px #00FF41, 0 0 15px #00FF41; border-radius: 15px; max-width: 900px; margin: auto; margin-top: 50px; }
        select, input, button { background: #000; color: #00FF41; border: 1px solid #00FF41; padding: 10px; margin-top: 5px; font-family: inherit; }
        .master-arm-container { background: #220000; padding: 15px; border: 2px solid #FF0000; color: #FF0000; border-radius: 5px; display: inline-block; }
        #run-sim { width: 100%; font-weight: bold; font-size: 1.5em; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        #run-sim:hover:not(:disabled) { background: #00FF41; color: #000; }
        #run-sim:disabled { opacity: 0.2; cursor: not-allowed; }
        .input-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; border: 1px solid #00FF41; margin-top: 20px; background: rgba(0, 255, 65, 0.05); }
        #cda-display { font-weight: bold; font-size: 1.2em; border: 1px solid #00FF41; padding: 5px; text-align: center; min-height: 25px; }
    </style>
</head>
<body>

<div class="mfd-screen">
    <h1>--- NORDEN II TACTICAL INTERFACE ---</h1>
    
    <div style="text-align: left; margin-bottom: 20px;">
        <div class="master-arm-container">
            MASTER ARM: <input type="checkbox" id="master-arm" onclick="toggleMasterArm()">
            <span id="systemStatus">SAFE</span>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px;">
        <div><label>OPERATIONAL THEATER</label><br><select id="nation-select" onchange="updateAircraftMenu()" style="width:100%;"><option value="">-- SELECT --</option><option value="USA">USA / NAVY / AF</option><option value="Great Britain">GREAT BRITAIN (RAF)</option></select></div>
        <div><label>AVAILABLE AIRFRAMES</label><br><select id="aircraft-select" onchange="updateWeaponMenu()" style="width:100%;"><option value="">-- WAITING --</option></select></div>
        <div><label>MUNITION (BOMB A)</label><br><select id="bombA-select" style="width:100%;"><option value="">-- WAITING --</option></select></div>
    </div>

    <div class="input-grid">
        <div><label>ALTITUDE (M)</label><br><input type="number" id="alt-input" value="3500" style="width:85%;"></div>
        <div><label>SPEED (KM/H)</label><br><input type="number" id="speed-input" value="650" style="width:85%;"></div>
        <div><label>DIVE ANGLE (°)</label><br><input type="number" id="dive-input" value="10" style="width:85%;"></div>
        <div><label>CALC CdA</label><br><div id="cda-display">0.000000</div></div>
    </div>

    <button id="run-sim" disabled onclick="runSimulation()">INITIATE BOMBING RUN</button>
</div>

<script src="script.js"></script>
</body>
</html>
