<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NORDEN II v2</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel">

<h1>NORDEN II — WSO PANEL</h1>

<div class="row">
<select id="ac" onchange="loadAC()"></select>
</div>

<div class="row">
<input id="alt" type="number" value="8000" placeholder="ALT (FT)">
<input id="spd" type="number" value="400" placeholder="SPD (MPH)">
<input id="dive" type="number" value="0" placeholder="DIVE (°)">
<input id="dist" type="number" value="3" placeholder="STANDOFF KM">
</div>

<div class="solutions">
<div class="sol">
<h3>A</h3>
<select id="bomb1" onchange="sync(1)"></select>
<div id="out1"></div>
</div>

<div class="sol">
<h3>B</h3>
<select id="bomb2" onchange="sync(2)"></select>
<div id="out2"></div>
</div>

<div class="sol">
<h3>C</h3>
<select id="bomb3" onchange="sync(3)"></select>
<div id="out3"></div>
</div>
</div>

<div class="row">
<select id="focus">
<option value="1">FOCUS A</option>
<option value="2">FOCUS B</option>
<option value="3">FOCUS C</option>
</select>
<button onclick="solve()">SOLVE</button>
</div>

<div id="result">READY</div>

</div>

<script src="script.js"></script>
</body>
</html>
