<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NORDEN II | STRATEGIC HUB</title>
    <style>
        body { 
            background-color: #050505; color: #00FF41; font-family: 'Courier New', monospace;
            text-shadow: 0 0 5px #00FF41;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }
        .mfd-screen { border: 4px double #00FF41; margin: 20px; padding: 20px; background: rgba(0, 20, 0, 0.2); box-shadow: inset 0 0 20px #00FF41, 0 0 15px #00FF41; border-radius: 15px; }
        select, input, button { background: #000; color: #00FF41; border: 1px solid #00FF41; padding: 10px; margin-top: 5px; }
        .master-arm-container { background: #220000; padding: 15px; border: 2px solid #FF0000; color: #FF0000; border-radius: 5px; }
        #run-sim { width: 100%; font-weight: bold; font-size: 1.2em; cursor: pointer; margin-top: 20px; }
        #run-sim:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<div class="mfd-screen">
    <h1>--- NORDEN II TACTICAL INTERFACE ---</h1>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div class="master-arm-container">
            MASTER ARM: <input type="checkbox" id="master-arm" onclick="toggleMasterArm()">
            <span id="systemStatus">SAFE</span>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
        <div>
            <label>THEATER</label><br>
            <select id="nation-select" onchange="updateAircraftMenu()" style="width:100%;">
                <option value="">-- SELECT --</option>
                <option value="USA">USA</option>
                <option value="Great Britain">GREAT BRITAIN</option>
            </select>
        </div>
        <div>
            <label>AIRFRAME</label><br>
            <select id="aircraft-select" onchange="updateWeaponMenu()" style="width:100%;">
                <option value="">-- WAITING --</option>
            </select>
        </div>
        <div>
            <label>MUNITION (BOMB A)</label><br>
            <select id="bombA-select" style="width:100%;">
                <option value="">-- WAITING --</option>
            </select>
        </div>
    </div>

    <button id="run-sim" disabled onclick="runSimulation()">INITIATE BOMBING RUN</button>
</div>

<script src="script.js"></script>
</body>
</html>
