<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NORDEN II</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cockpit">
    <section class="panel left-panel">
      <h2>LOADOUT</h2>

      <label for="country">COUNTRY</label>
      <select id="country" onchange="loadCountry()"></select>

      <label for="ac">AIRCRAFT</label>
      <select id="ac" onchange="loadAircraft()"></select>

      <div class="flight-grid">
        <div class="grid-item">
          <div class="mini-label">ALTITUDE</div>
          <input id="alt" type="number" value="8000">
        </div>
        <div class="grid-item">
          <div class="mini-label">SPEED</div>
          <input id="spd" type="number" value="400" oninput="clampSpeed()">
        </div>
        <div class="grid-item">
          <div class="mini-label">DIVE</div>
          <input id="dive" type="number" value="0">
        </div>
      </div>

      <div class="standoff-block">
        <div class="standoff-label">
          <div>TARGET</div>
          <div>RANGE</div>
        </div>
        <input id="dist" type="number" value="3">
        <div class="unit-label">METRES</div>
      </div>

      <div id="adv" class="adv">AIRFRAME LIMITS NOMINAL</div>

      <!-- WATUP SWITCH -->
      <div id="bombModeBar" class="bomb-mode-bar">
        <div class="bomb-mode-toggle"
          title="W.A.T.U.P. Mode — Wild Ass Test Un-Pressured: no restrictions, load anything.">

          <span>Nation</span>

          <label class="switch">
            <input type="checkbox" id="watupToggle">
            <span class="slider"></span>
          </label>

          <span>W.A.T.U.P.</span>
        </div>

        <div id="bombModeHint" class="bomb-mode-hint">
          Filtered by selected aircraft nation
        </div>
      </div>

    </section>

    <!-- rest unchanged -->
    <section class="panel center-panel"></section>
    <section class="panel right-panel"></section>
  </div>

  <script src="script.js"></script>
</body>
</html>
